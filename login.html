<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Pendeza Wholesale</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Small styling alignment to center it on its own dedicated page */
        .standalone-login-page {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111111; /* Dark theme matching the index hero banner fallback */
        }
        .standalone-login-page .login-box-card {
            transform: translateY(0); /* Lock animation in place */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="standalone-login-page">

    <div class="login-box-card">
        <a href="index.html" style="position: absolute; top: 15px; left: 20px; text-decoration: none; color: #666; font-size: 14px;">← Home</a>
        
        <h2>Welcome Back</h2>
        <p class="modal-subtitle">Sign in to your wholesale account</p>
        
        <form action="#" method="POST">
            <div class="input-group">
                <input type="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Password" required>
            </div>
            <div class="form-actions">
                <a href="#" class="forgot-pass">Forgot Password?</a>
            </div>
            <button type="submit" class="modal-submit-btn">SIGN IN</button>
        </form>
        
        <div class="modal-footer">
            <p>New to Pendeza? <a href="#">Create an account</a></p>
        </div>
    </div>

</body>
</html>
